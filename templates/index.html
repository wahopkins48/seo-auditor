<!DOCTYPE html>
<html>
<head>
    <title>Crawled SEO | Digital Visibility Audit</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color: #1a73e8; margin-bottom: 10px;">Crawled SEO<br>Digital Visibility Audit</h1>
        <p style="color: #666;">Generate a technical audit in seconds to determine your website's crawlability.</p>
        <form action="/audit">
            <input name="url" placeholder="https://www.example.com" required>
            <button type="submit">Run Audit & Download Report</button>
        </form>
    </div>
</body>
</html>
